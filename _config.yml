# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "小老弟你来啦？"
sidebar-avatar: /img/headimg.jpeg     # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
RSS: false
