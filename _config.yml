# Site settings
title: 温轩的博客
SEOTitle: 温轩的博客 | XW Blog
header-img: img/post-bg-2015.jpg
email: xwen1765@gmail.com
# description: "Every failure is leading towards success."
# keyword: "BY, BY Blog, 柏荧的博客, qiubaiying, 邱柏荧, iOS, Apple, iPhone"
url: "http://xwen1765.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
